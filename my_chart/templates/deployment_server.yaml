apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    chart: {{ .Chart.Name | lower }}
    release: {{ .Release.Name | lower }}
  name: {{ .Release.Name | lower | quote }}
spec:
  replicas: {{ .Values.replicaCount | int }}
  selector:
    matchLabels:
      chart: {{ .Chart.Name | lower }}
      release: {{ .Release.Name | lower }}
  strategy: {}
  template:
    metadata:
      labels:
        chart: {{ .Chart.Name | lower }}
        release: {{ .Release.Name | lower }}
    spec:
      containers:
      - image: nginx
        name: nginx
        resources: {}
        {{- if (.Values.EnableLogging ) }}
      - name: fluentd
        image: fluent/fluentd
        {{- end }}
status: {}
