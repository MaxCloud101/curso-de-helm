apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    chart: {{ .Chart.Name | lower }}
    release: {{ .Release.Name | lower }}
  name: {{ .Release.Name | lower | quote }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      chart: {{ .Chart.Name | lower }}
      release: {{ .Release.Name | lower }}
  strategy: {}
  template:
    metadata:
      labels:
        app: my-server
    spec:
      containers:
      - image: nginx
        name: nginx
        resources: {}
status: {}
