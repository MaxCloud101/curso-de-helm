apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: my-server
  name: my-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: my-server
  strategy: {}
  template:
    metadata:
      labels:
        app: my-server
    spec:
      containers:
      - image: nginx
        name: nginx
        resources: {}
status: {}
