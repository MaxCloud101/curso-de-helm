apiVersion: v2
name: my-server-chart
description: A Helm chart for Kubernetes
type: application

version: 0.1.0
appVersion: "1.1.0"

dependencies:
  - name: mysql
    version: "0.3.5"
    repository: "https://kubelauncher.github.io/charts"
    condition: mysql.enabled

  - name: redis 
    version: "0.3.5"
    repository: "https://kubelauncher.github.io/charts"
    condition: redis.enabled
