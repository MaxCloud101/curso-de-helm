apiVersion: v2
name: my-server-chart
description: A Helm chart for Kubernetes
type: application

version: 0.1.0
appVersion: "1.1.0"

dependencies:
  - name: mysql
    version: "14.0.3"
    repository: "https://charts.bitnami.com/bitnami"
    condition: mysql.enabled

  - name: rabbitmq
    version: "16.0.14"
    repository: "https://charts.bitnami.com/bitnami"
    condition: rabbitmq.enabled
